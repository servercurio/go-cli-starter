openapi: 3.0.3
info:
    title: AppSvr
    version: unreleased
servers:
    - url: https://localhost:4443
      description: TLS endpoint
    - url: http://localhost:8080
      description: HTTP endpoint
paths:
    /api/v1/healthz:
        get:
            operationId: health-get
            summary: Readiness probe
            description: Aggregates the status of every registered component. Returns 200 when every component reports UP; 503 when any reports DOWN. Used by load balancers / Kubernetes readiness probes to drain traffic from unhealthy instances.
            tags:
                - api/v1
            responses:
                "200":
                    description: All components are UP
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/health.Report'
                "503":
                    description: At least one component is DOWN
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/health.Report'
    /api/v1/livez:
        get:
            operationId: liveness-get
            summary: Liveness probe
            description: Returns 200 whenever the process is able to respond to HTTP. Used by Kubernetes' liveness probe to decide whether to restart the pod.
            tags:
                - api/v1
            responses:
                "200":
                    description: Process is alive
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/health.Report'
    /api/v1/readyz:
        get:
            operationId: readiness-get
            summary: Readiness probe
            description: Aggregates the status of every registered component. Returns 200 when every component reports UP; 503 when any reports DOWN. Used by load balancers / Kubernetes readiness probes to drain traffic from unhealthy instances.
            tags:
                - api/v1
            responses:
                "200":
                    description: All components are UP
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/health.Report'
                "503":
                    description: At least one component is DOWN
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/health.Report'
tags:
    - name: api
    - name: api/v1
components:
    schemas:
        health.ComponentResult:
            type: object
            properties:
                details:
                    type: object
                    additionalProperties: {}
                status:
                    type: string
            required:
                - status
        health.Report:
            type: object
            properties:
                components:
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/health.ComponentResult'
                status:
                    type: string
            required:
                - status
                - components
