{{- if .Values.tests.enabled -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "go-cli-starter.fullname" . }}-test-connection"
  labels:
    {{- include "go-cli-starter.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ include "go-cli-starter.serviceAccountName" . }}
  automountServiceAccountToken: false
  {{- with .Values.podSecurityContext }}
  securityContext:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: livez
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      command:
        - sh
        - -c
        - |
          set -e
          wget -qO- "http://{{ include "go-cli-starter.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.service.port }}/api/v1/livez"
          echo "livez OK"
          wget -qO- "http://{{ include "go-cli-starter.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.service.port }}/api/v1/readyz"
          echo "readyz OK"
{{- end }}
