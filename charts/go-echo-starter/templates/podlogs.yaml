{{- if .Values.logging.podLogs.enabled -}}
{{- if .Capabilities.APIVersions.Has "monitoring.grafana.com/v1alpha2" -}}
apiVersion: monitoring.grafana.com/v1alpha2
kind: PodLogs
metadata:
  name: {{ include "go-echo-starter.fullname" . }}
  {{- with .Values.logging.podLogs.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "go-echo-starter.labels" . | nindent 4 }}
    {{- with .Values.logging.podLogs.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "go-echo-starter.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  {{- with .Values.logging.podLogs.relabelings }}
  relabelings:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.logging.podLogs.pipelineStages }}
  pipelineStages:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
