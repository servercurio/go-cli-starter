# Used by `ct install` for the default install path. Kept minimal — only enough to
# exercise the deployment, service, configmap, and serviceaccount on a kind cluster.
# Test image override matches the locally-loaded image in CI.
image:
  repository: appsvr
  tag: latest
  pullPolicy: IfNotPresent

config:
  APP_DAEMON_LOG_LEVEL: info
  APP_HTTP_ACCESS_LOG_ENABLED: "true"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
