# SPDX-License-Identifier: Apache-2.0

name: "200: [FLOW] CodeQL Scanning"
on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
  schedule:
    # Weekly full scan against the default branch so newly published
    # CodeQL queries surface against stable code, not just changed lines.
    - cron: "23 6 * * 1"

defaults:
  run:
    shell: bash

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: "CodeQL Analyze (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: actions
            build-mode: none
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Toolchains have to be installed BEFORE codeql-action/init for the Go
      # language matrix entry: init wraps the go binary with its tracer, and
      # if Go is installed afterwards the build uses an un-wrapped binary
      # and the CodeQL database ends up empty ("this run didn't build any
      # of it"). The actions matrix entry uses build-mode: none so it
      # doesn't need either toolchain — gate both on `manual`.
      - name: Install Task
        if: matrix.build-mode == 'manual'
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.39.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GoLang
        if: matrix.build-mode == 'manual'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
          check-latest: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Build Go
        if: matrix.build-mode == 'manual'
        run: |
          task generate
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: "/language:${{ matrix.language }}"
