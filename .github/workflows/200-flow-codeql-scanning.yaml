# SPDX-License-Identifier: Apache-2.0

name: "200: [FLOW] CodeQL Scanning"
on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
  schedule:
    # Weekly full scan against the default branch so newly published
    # CodeQL queries surface against stable code, not just changed lines.
    - cron: "23 6 * * 1"

defaults:
  run:
    shell: bash

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: "CodeQL Analyze (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: actions
            build-mode: none
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Toolchains have to be installed BEFORE codeql-action/init for the Go
      # language matrix entry: init wraps the go binary with its tracer, and
      # if Go is installed afterwards the build uses an un-wrapped binary
      # and the CodeQL database ends up empty ("this run didn't build any
      # of it"). The actions matrix entry uses build-mode: none so it
      # doesn't need either toolchain — gate both on `manual`.
      - name: Install Task
        if: matrix.build-mode == 'manual'
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.39.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GoLang
        if: matrix.build-mode == 'manual'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.2
          check-latest: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Build Go
        if: matrix.build-mode == 'manual'
        run: |
          task generate
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: "/language:${{ matrix.language }}"
