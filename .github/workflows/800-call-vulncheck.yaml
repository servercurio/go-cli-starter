name: "800: [CALL] Vulnerability Check"
on:
  workflow_call:
    inputs:
      go-version:
        description: "Go Version:"
        type: string
        required: false
        default: "1.26.4"
      govulncheck-version:
        description: "govulncheck CLI module version (golang.org/x/vuln):"
        type: string
        required: false
        default: "v1.3.0"
      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "Vulnerability Check"

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  vulncheck:
    name: "${{ inputs.custom-job-label || 'Vulnerability Check' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup GoLang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version || '1.26.4' }}
          check-latest: false

      # govulncheck is invoked directly via `go install` rather than through
      # the golang/govulncheck-action wrapper. The wrapper's action.yml
      # references actions/checkout and actions/setup-go by tag, which the
      # repo's transitive-SHA-pinning policy rejects. `go install` is a
      # `run:` shell command, not an action, so it isn't subject to that
      # rule — and it lets us pin the CLI to an exact module version.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ inputs.govulncheck-version || 'v1.3.0' }}

      - name: Run govulncheck
        run: govulncheck ./...
