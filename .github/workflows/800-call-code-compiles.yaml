# SPDX-License-Identifier: Apache-2.0

name: "800: [CALL] Code Compiles"
on:
  workflow_call:
    inputs:
      go-version:
        description: "Go Version:"
        type: string
        required: false
        default: "1.26.5"
      task-version:
        description: "Task Version:"
        type: string
        required: false
        default: "3.39.2"
      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "Code Compiles"

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  code-compiles:
    name: ${{ inputs.custom-job-label || 'Code Compiles' }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: ${{ inputs.task-version || '3.39.2' }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GoLang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version || '1.26.5' }}
          check-latest: false

      - name: Generate Version Files
        run: task generate

      - name: Code Style
        run: task lint

      - name: Compile Code
        run: task build
