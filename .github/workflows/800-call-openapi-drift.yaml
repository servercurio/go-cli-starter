# SPDX-License-Identifier: Apache-2.0

name: "800: [CALL] OpenAPI Drift"
on:
  workflow_call:
    inputs:
      go-version:
        description: "Go Version:"
        type: string
        required: false
        default: "1.26.2"
      task-version:
        description: "Task Version:"
        type: string
        required: false
        default: "3.39.2"
      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "OpenAPI Drift"

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  openapi-drift:
    name: "${{ inputs.custom-job-label || 'OpenAPI Drift' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: ${{ inputs.task-version || '3.39.2' }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GoLang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version || '1.26.2' }}
          check-latest: false

      # internal/version/commit.txt and internal/openapi/logo.svg are
      # //go:embed-ed but produced by go generate (see CLAUDE.md §
      # "Local environment vs binary defaults"). Without this step
      # cmd/openapi-gen fails to compile.
      - name: Generate Version Files
        run: task generate

      - name: Verify OpenAPI Spec Matches Code
        run: task openapi:check
