# SPDX-License-Identifier: Apache-2.0

name: "200: [FLOW] PR Checks"
on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

defaults:
  run:
    shell: bash

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code-compiles:
    name: "Code Compiles"
    uses: ./.github/workflows/800-call-code-compiles.yaml
    with:
      custom-job-label: Standard

  unit-tests:
    name: "Unit Tests"
    uses: ./.github/workflows/800-call-unit-test.yaml
    needs:
      - code-compiles
    with:
      custom-job-label: Standard
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  vulnerability-check:
    name: "Vulnerability Check"
    uses: ./.github/workflows/800-call-vulncheck.yaml
    needs:
      - code-compiles
    with:
      custom-job-label: Standard

  openapi-drift:
    name: "OpenAPI Drift"
    uses: ./.github/workflows/800-call-openapi-drift.yaml
    needs:
      - code-compiles
    with:
      custom-job-label: Standard

  helm-lint:
    name: "Helm Lint"
    uses: ./.github/workflows/800-call-helm-lint.yaml
    with:
      custom-job-label: Standard

  helm-install:
    name: "Helm Install"
    uses: ./.github/workflows/800-call-helm-install.yaml
    needs:
      - helm-lint
    with:
      custom-job-label: Standard
