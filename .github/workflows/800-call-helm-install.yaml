# SPDX-License-Identifier: Apache-2.0

name: "800: [CALL] Helm Install"
on:
  workflow_call:
    inputs:
      helm-version:
        description: "Helm release version (https://github.com/helm/helm/releases):"
        type: string
        required: false
        default: "v3.20.2"
      kind-action-version:
        description: "helm/kind-action release version (https://github.com/helm/kind-action/releases):"
        type: string
        required: false
        default: "v1.14.0"
      kind-node-image:
        description: "kind node image (must match a kind-version-tested k8s release):"
        type: string
        required: false
        default: "kindest/node:v1.32.2"
      chart-testing-version:
        description: "chart-testing release version:"
        type: string
        required: false
        default: "v3.13.0"
      go-version:
        description: "Go Version:"
        type: string
        required: false
        default: "1.26.2"
      task-version:
        description: "Task Version:"
        type: string
        required: false
        default: "3.39.2"
      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "Helm Install"

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  helm-install:
    name: "${{ inputs.custom-job-label || 'Helm Install' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup GoLang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          check-latest: false

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: ${{ inputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        env:
          HELM_VERSION: ${{ inputs.helm-version }}
        run: |
          set -euo pipefail
          HELM_TARBALL="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSLo "/tmp/${HELM_TARBALL}" "https://get.helm.sh/${HELM_TARBALL}"
          curl -fsSLo "/tmp/${HELM_TARBALL}.sha256sum" "https://get.helm.sh/${HELM_TARBALL}.sha256sum"
          ( cd /tmp && sha256sum -c "${HELM_TARBALL}.sha256sum" )
          tar -xzf "/tmp/${HELM_TARBALL}" -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Install chart-testing (ct)
        # SHA pin: helm/chart-testing-action@v2.8.0. Verify against
        # https://github.com/helm/chart-testing-action/releases.
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f
        with:
          version: ${{ inputs.chart-testing-version }}

      - name: Build container image (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          set -euo pipefail
          task build:container

      - name: Create kind cluster
        # SHA pin: helm/kind-action@v1.14.0. Verify against
        # https://github.com/helm/kind-action/releases.
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: ct
          node_image: ${{ inputs.kind-node-image }}
          wait: 120s

      - name: Inspect cluster
        run: |
          set -euo pipefail
          kubectl cluster-info --context kind-ct
          kubectl get nodes

      - name: Load image into kind
        run: |
          set -euo pipefail
          # Match the image reference used by both ci value fixtures.
          # helm/kind-action does not load images itself; do that here.
          kind load docker-image appsvr:latest --name ct

      - name: Chart Testing Install
        run: |
          set -euo pipefail
          # ct iterates each ci/*-values.yaml file and runs a separate `helm install --wait`.
          # Both ci/default-values.yaml and ci/full-values.yaml point at appsvr:latest (loaded above).
          # The full-values fixture intentionally leaves tls.enabled=false so it installs cleanly
          # on a bare cluster; TLS render coverage is exercised by the lint workflow's helm:template.
          ct install \
            --target-branch main \
            --chart-dirs charts \
            --helm-extra-args "--timeout=300s"

      - name: Export Kind Logs On Failure
        if: failure()
        run: |
          kind export logs /tmp/kind-logs --name ct || true
          tar -czf /tmp/kind-logs.tgz -C /tmp kind-logs || true

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: kind-logs
          path: /tmp/kind-logs.tgz
          if-no-files-found: ignore

      - name: Tear down kind
        if: always()
        run: kind delete cluster --name ct || true
