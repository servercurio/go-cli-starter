# SPDX-License-Identifier: Apache-2.0

name: "800: [CALL] Unit Test"
on:
  workflow_call:
    inputs:
      go-version:
        description: "Go Version:"
        type: string
        required: false
        default: "1.26.5"
      task-version:
        description: "Task Version:"
        type: string
        required: false
        default: "3.39.2"
      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "Unit Test"
      coverage-threshold:
        description: "Minimum total coverage percentage (the workflow fails if coverage falls below this floor). Set to 0 to disable."
        type: string
        required: false
        default: "30"
    secrets:
      codecov-token:
        description: "Codecov upload token (required for private repos; optional but recommended for public repos to avoid rate limits)"
        required: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  unit-test:
    name: "${{ inputs.custom-job-label || 'Unit Test' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: ${{ inputs.task-version || '3.39.2' }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GoLang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version || '1.26.5' }}
          check-latest: false

      - name: Generate Version Files
        run: task generate

      - name: Run Unit Tests
        run: task test

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./cover.out
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.codecov-token }}

      # Threshold gate runs *after* the codecov upload so a sub-threshold
      # run still publishes its coverage to the Codecov dashboard before
      # this step fails the workflow.
      - name: Enforce Coverage Threshold
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          if [ "${COVERAGE_THRESHOLD}" = "0" ]; then
            echo "coverage threshold disabled (input set to 0)"
            exit 0
          fi
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {print $3}' | tr -d '%')
          if [ -z "$pct" ]; then
            echo "could not parse coverage percentage from cover.out" >&2
            exit 1
          fi
          echo "total coverage: ${pct}%, threshold: ${COVERAGE_THRESHOLD}%"
          awk -v p="$pct" -v t="${COVERAGE_THRESHOLD}" 'BEGIN { exit (p+0 < t+0) }' || {
            echo "::error::Coverage ${pct}% is below the configured threshold of ${COVERAGE_THRESHOLD}%"
            exit 1
          }
