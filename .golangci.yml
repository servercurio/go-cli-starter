version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unused
    - wastedassign
  exclusions:
    paths:
      - vendor
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - gosec
          - noctx
      - path: internal/openapi/schema_test\.go
        text: "field internal is unused"

  settings:
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: var-declaration

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - vendor
