version: 3
output: prefixed

vars:
  PROJECT_NAME: appcli
  ARCH: [amd64, arm64]
  OS: [linux, darwin, windows]
  LDFLAGS: "-w -s"
#  LDFLAGS: ""

env:
  CGO_ENABLED: 0
  APP_DAEMON_LOG_LEVEL: trace
  APP_DAEMON_LOG_INCLUDE_CALLER: false

tasks:
  default:
    desc: "Clean, lint, and build all Go programs"
    cmds:
      - task: clean
      - task: vendor
      - task: lint
      - task: build

  clean:
    desc: "Remove all generated files"
    cmds:
      - task: clean:dist
      - task: clean:bin
      - task: clean:test

  clean:dist:
    desc: "Remove all distribution files"
    internal: true
    cmds:
      - rm -rvf dist

  clean:bin:
    desc: "Remove all binary files"
    internal: true
    cmds:
      - rm -rvf bin

  clean:test:
    desc: "Remove all test files"
    internal: true
    cmds:
      - rm -vf cover.out

  clean:cache:
    desc: "Remove all Go build caches"
    cmds:
      - go clean -cache -testcache

  lint:
    desc: "Run linters on all Go files"
    cmds:
      - task: lint:format
      - task: lint:vet
      - task: lint:golangci

  lint:format:
    internal: true
    desc: "Run go fmt on all Go files"
    cmds:
      - go fmt ./...

  lint:vet:
    internal: true
    desc: "Run go vet on all Go files"
    cmds:
      - go vet -atomic -defers -assign -bools -buildtag -framepointer -lostcancel -loopclosure -nilfunc -shift -stdmethods -stringintconv -structtag ./...

  lint:golangci:
    internal: true
    desc: "Run golangci-lint with the project's .golangci.yml"
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1
      - "$(go env GOPATH)/bin/golangci-lint run --timeout=5m ./..."

  vendor:
    desc: "Update Go modules and vendor directory"
    cmds:
      - cmd: echo "Tidying up Go modules"
        silent: true
      - cmd: go mod tidy
        silent: true
      - cmd: echo "Updating vendor directory"
        silent: true
      - cmd: go mod vendor
        silent: true

  generate:
    desc: "Run all go:generate directives (version metadata, etc.)"
    cmds:
      - cmd: go generate ./...
        silent: true

  sbom:
    desc: "Generate CycloneDX SBOMs (bin/sbom.json + bin/sbom.xml) for the CLI module and GPG-sign each output"
    deps:
      - vendor
    cmds:
      - cmd: |
          set -e
          mkdir -p bin
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.7.0
          "$(go env GOPATH)/bin/cyclonedx-gomod" app -json=true -licenses -output bin/sbom.json -main cmd/appcli
          "$(go env GOPATH)/bin/cyclonedx-gomod" app -licenses -output bin/sbom.xml -main cmd/appcli
          # SBOMs are themselves manifests; sign them directly so consumers can verify the
          # dependency listing offline. Signing is best-effort locally — the workflow
          # imports a GPG key before running this task.
          if gpg --list-secret-keys --with-colons 2>/dev/null | grep -q '^sec'; then
            gpg --batch --yes --detach-sign --armor --output bin/sbom.json.asc bin/sbom.json
            gpg --batch --yes --detach-sign --armor --output bin/sbom.xml.asc bin/sbom.xml
          else
            echo "warning: no GPG signing key configured; skipping SBOM signature" >&2
          fi
        silent: true

  hash:
    desc: "Generate per-binary SHA-256 hashes (writes bin/<binary>.sha256 per binary)"
    dir: bin
    cmds:
      - cmd: |
          set -e
          rm -f *.sha256
          found=0
          for f in {{.PROJECT_NAME}}-*; do
            case "$f" in
              *.sha256|*.asc) continue ;;
            esac
            [ -f "$f" ] || continue
            shasum -a 256 "$f" > "${f}.sha256"
            cat "${f}.sha256"
            found=1
          done
          if [ "$found" -eq 0 ]; then
            echo "no binaries matching '{{.PROJECT_NAME}}-*' found in bin/ — run 'task build' first" >&2
            exit 1
          fi
        silent: true

  sign:
    desc: "GPG-sign each SHA256 hash file (writes bin/<binary>.sha256.asc per binary). Depends on task hash. Binaries themselves are NOT signed — the signed hash transitively pins the binary."
    deps:
      - hash
    dir: bin
    cmds:
      - cmd: |
          set -e
          rm -f *.asc
          found=0
          for hash_file in {{.PROJECT_NAME}}-*.sha256; do
            [ -f "$hash_file" ] || continue
            gpg --batch --yes --detach-sign --armor --output "${hash_file}.asc" "$hash_file"
            found=1
          done
          if [ "$found" -eq 0 ]; then
            echo "no .sha256 files matching '{{.PROJECT_NAME}}-*.sha256' found in bin/ — run 'task hash' first" >&2
            exit 1
          fi
        silent: true

  build:
    desc: "Build all Go programs"
    cmds:
      - task: build:cli:all

  build:cli:all:
    internal: true
    desc: "Build the {{.PROJECT_NAME}} CLI"
    cmds:
      - task: build:cli:all:os

  build:cli:all:os:
    internal: true
    desc: "Build the {{.PROJECT_NAME}} CLI for all configured operating systems"
    cmds:
      - for:
          var: OS
        task: build:cli:all:arch
        vars:
          GOOS: "{{.ITEM}}"

  build:cli:all:arch:
    internal: true
    desc: "Build the {{.PROJECT_NAME}} CLI for all configured architectures"
    cmds:
      - for:
          var: ARCH
        task: build:cli
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.ITEM}}"

  build:cli:
    internal: true
    desc: "Build the {{.PROJECT_NAME}} CLI for the given OS/arch"
    env:
      GOOS: "{{coalesce .GOOS OS}}"
      GOARCH: "{{coalesce .GOARCH ARCH}}"
    cmds:
      - cmd: echo "Building {{.PROJECT_NAME}} for ${GOOS}/${GOARCH}"
        silent: true
      - task: generate
      - cmd: go build -o bin/{{.PROJECT_NAME}}-${GOOS}-${GOARCH} -ldflags="{{.LDFLAGS}}" -trimpath ./cmd/appcli
        silent: true
      - cmd: chmod +x bin/{{.PROJECT_NAME}}-${GOOS}-${GOARCH}
        silent: true

  build:container:
    desc: "Build the {{.PROJECT_NAME}} container"
    deps:
      - task: build:cli
        vars:
          GOOS: linux
    cmds:
      - docker buildx build --load -t {{.PROJECT_NAME}}:latest .

  test:
    desc: "Run all tests"
    env:
      CGO_ENABLED: 1
    cmds:
      - go test -parallel 4 -cover -coverprofile cover.out -race -v ./...

  run:
    desc: "Run the {{.PROJECT_NAME}} programs (defaults to the serve subcommand)"
    cmds:
      - task: run:serve

  run:serve:
    desc: "Run the {{.PROJECT_NAME}} daemon example via the serve subcommand"
    env:
      GOOS: "{{OS}}"
      GOARCH: "{{ARCH}}"
    cmds:
      - task: vendor
      - task: build:cli
      - cmd: echo "Running {{.PROJECT_NAME}} serve for ${GOOS}/${GOARCH}"
        silent: true
      - cmd: ./bin/{{.PROJECT_NAME}}-${GOOS}-${GOARCH} serve
        silent: true

  run:copy:
    desc: "Run the {{.PROJECT_NAME}} one-shot example: copies README.md to /tmp/copy.md"
    env:
      GOOS: "{{OS}}"
      GOARCH: "{{ARCH}}"
    cmds:
      - task: vendor
      - task: build:cli
      - cmd: echo "Running {{.PROJECT_NAME}} copy for ${GOOS}/${GOARCH}"
        silent: true
      - cmd: ./bin/{{.PROJECT_NAME}}-${GOOS}-${GOARCH} copy README.md /tmp/copy.md
        silent: true

  run:container:
    desc: "Run the {{.PROJECT_NAME}} container (prints --help)"
    deps:
      - build:container
    cmds:
      - docker run --rm -it {{.PROJECT_NAME}}:latest --help

  # ---------------------------------------------------------------------------
  # Multi-arch container publishing. Used by the release workflow's publishCmd.
  # ---------------------------------------------------------------------------

  container:registry:
    internal: true
    desc: "Print the canonical container image registry/repository path"
    cmds:
      - cmd: printf 'ghcr.io/servercurio/go-cli-starter'
        silent: true

  container:build:multiarch:
    desc: "Build and push a multi-arch (linux/amd64,linux/arm64) container image to GHCR. Reads VERSION from internal/version/version.txt; release workflow runs `docker login ghcr.io` first."
    deps:
      - task: build:cli
        vars:
          GOOS: linux
          GOARCH: amd64
      - task: build:cli
        vars:
          GOOS: linux
          GOARCH: arm64
    cmds:
      - cmd: |
          set -e
          mkdir -p bin
          VERSION="$(cat internal/version/version.txt | tr -d '[:space:]')"
          if [ -z "$VERSION" ]; then
            echo "internal/version/version.txt is empty — refusing to push an unversioned image" >&2
            exit 1
          fi
          REPO="ghcr.io/servercurio/go-cli-starter"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=true \
            --sbom=false \
            --push \
            -t "${REPO}:${VERSION}" \
            -t "${REPO}:latest" \
            -f Dockerfile .
          # Capture the manifest-list digest for downstream attestation steps.
          docker buildx imagetools inspect "${REPO}:${VERSION}" --format '{{`{{ .Manifest.Digest }}`}}' > bin/container-image.digest
          echo "container image: ${REPO}:${VERSION}@$(cat bin/container-image.digest)"
        silent: true

  container:sbom:
    desc: "Generate CycloneDX SBOMs (bin/container-sbom.{json,xml}) for the published container image using syft"
    cmds:
      - cmd: |
          set -e
          if ! command -v syft >/dev/null 2>&1; then
            echo "syft not found on PATH — install via release tarball (https://github.com/anchore/syft/releases) before running this task" >&2
            exit 1
          fi
          VERSION="$(cat internal/version/version.txt | tr -d '[:space:]')"
          REPO="ghcr.io/servercurio/go-cli-starter"
          syft "${REPO}:${VERSION}" -o cyclonedx-json=bin/container-sbom.json -o cyclonedx-xml=bin/container-sbom.xml
        silent: true

  container:sbom:sign:
    desc: "GPG-sign the container SBOM files (bin/container-sbom.{json,xml}.asc)"
    cmds:
      - cmd: |
          set -e
          for f in bin/container-sbom.json bin/container-sbom.xml; do
            [ -f "$f" ] || { echo "$f missing — run 'task container:sbom' first" >&2; exit 1; }
            gpg --batch --yes --detach-sign --armor --output "${f}.asc" "$f"
          done
        silent: true
